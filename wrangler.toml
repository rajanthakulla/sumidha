name = "sumida-international"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB" # This is how we access the DB in Prisma
database_name = "sumida-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID" # You will replace this later
migrations_dir = "prisma/migrations"
